<!doctype html>
<!--
  Buffalo Projects profile card — MCP App view (SEP-1865, spec 2026-01-26).

  Rendered by MCP Apps hosts (Claude, ChatGPT, VS Code, …) in a sandboxed
  iframe when an agent calls buffalo.get_velocity. Fully self-contained:
  inline CSS, inline bundled script, no external fetches.

  Every visible field comes from the tool result (structuredContent).
  Missing data renders as nothing — no placeholder copy, no invented numbers.

  Theming: host style variables (per the MCP Apps spec) are honored when the
  host provides them; fallbacks are the Buffalo Projects dark palette from
  DESIGN.md. Brand blue #2F73F0 is fixed — it is the velocity/active color.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buffalo Projects</title>
    <style>
      :root {
        --bp-blue: #2f73f0;
        --bp-canvas: var(--color-background-primary, #111111);
        --bp-surface: var(--color-background-secondary, #171717);
        --bp-text: var(--color-text-primary, #f5f5f5);
        --bp-text-2: var(--color-text-secondary, #a3a3a3);
        --bp-text-3: var(--color-text-tertiary, #737373);
        --bp-border: var(--color-border-primary, rgba(255, 255, 255, 0.063));
        --bp-sans: var(
          --font-sans,
          "Geist",
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif
        );
        --bp-mono: var(
          --font-mono,
          "Geist Mono",
          ui-monospace,
          "SF Mono",
          Menlo,
          monospace
        );
        color-scheme: dark light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      body {
        font-family: var(--bp-sans);
        color: var(--bp-text);
        -webkit-font-smoothing: antialiased;
      }

      .card {
        background: var(--bp-canvas);
        border: 1px solid var(--bp-border);
        border-radius: 10px;
        padding: 20px;
        max-width: 560px;
        margin: 0 auto;
      }

      [data-display-mode="fullscreen"] .card {
        max-width: 720px;
        margin-top: 32px;
      }

      .card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .identity {
        min-width: 0;
      }

      .name {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.3;
        margin: 0;
      }

      .handle {
        font-family: var(--bp-mono);
        font-size: 12px;
        color: var(--bp-text-3);
        margin-top: 2px;
      }

      .headline {
        font-size: 13px;
        line-height: 1.45;
        color: var(--bp-text-2);
        margin: 8px 0 0;
        max-width: 46ch;
      }

      .open-link {
        flex: none;
        appearance: none;
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        color: var(--bp-text-2);
        background: var(--bp-surface);
        border: 1px solid var(--bp-border);
        border-radius: 6px;
        padding: 5px 10px;
        cursor: pointer;
        white-space: nowrap;
      }

      .open-link:hover {
        color: var(--bp-text);
        border-color: var(--color-border-secondary, rgba(255, 255, 255, 0.094));
      }

      .open-link:focus-visible {
        outline: 2px solid var(--bp-blue);
        outline-offset: 1px;
      }

      .velocity {
        margin-top: 16px;
      }

      .velocity-stats {
        font-family: var(--bp-mono);
        font-size: 11px;
        color: var(--bp-text-3);
        margin-bottom: 8px;
      }

      .velocity-stats .active {
        color: var(--bp-blue);
      }

      .heatmap {
        display: flex;
        gap: 3px;
      }

      .heatmap-week {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .heatmap-day {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        background: var(--bp-cell-empty, rgba(127, 127, 127, 0.16));
      }

      .heatmap-day[data-level="1"] {
        background: rgba(47, 115, 240, 0.3);
      }

      .heatmap-day[data-level="2"] {
        background: rgba(47, 115, 240, 0.5);
      }

      .heatmap-day[data-level="3"] {
        background: rgba(47, 115, 240, 0.75);
      }

      .heatmap-day[data-level="4"] {
        background: #2f73f0;
      }

      .meta {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .meta-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        font-size: 12px;
        color: var(--bp-text-2);
        min-width: 0;
      }

      .meta-label {
        flex: none;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--bp-text-3);
      }

      .meta-value {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .meta-date {
        flex: none;
        font-family: var(--bp-mono);
        font-size: 11px;
        color: var(--bp-text-3);
      }

      .card-foot {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid var(--bp-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .wordmark {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--bp-text-3);
      }

      .record-url {
        font-family: var(--bp-mono);
        font-size: 11px;
        color: var(--bp-text-3);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--__APP_SCRIPT__-->
  </body>
</html>
